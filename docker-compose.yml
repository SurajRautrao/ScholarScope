services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./graphs:/app/graphs   # ✅ shared folder for graphs

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "8501:8501"
    depends_on:
      - backend
    volumes:
      - ./graphs:/app/graphs   # ✅ SAME shared folder
